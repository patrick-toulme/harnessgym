name: Publish to PyPI

# Publish the package to PyPI via OIDC trusted publishing — no API token
# stored in the repo. Fires when a version tag (v*) is pushed, or manually.
#
# One-time PyPI setup (project → Manage → Publishing → add a GitHub publisher):
#   Owner:       patrick-toulme
#   Repository:  harnessgym
#   Workflow:    publish.yml
#   Environment: pypi
#
# Release flow: bump `version` in pyproject.toml, commit, then
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/harnessgym/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
